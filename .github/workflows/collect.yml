name: Collect repository snapshots

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AI_PROJECT_INSIGHTS_ENABLED: ${{ vars.AI_PROJECT_INSIGHTS_ENABLED }}
      AI_PROJECT_INSIGHTS_LIMIT: ${{ vars.AI_PROJECT_INSIGHTS_LIMIT }}
      AI_PROJECT_INSIGHTS_API_KEY: ${{ secrets.AI_PROJECT_INSIGHTS_API_KEY }}
      AI_PROJECT_INSIGHTS_BASE_URL: ${{ vars.AI_PROJECT_INSIGHTS_BASE_URL }}
      AI_PROJECT_INSIGHTS_MODEL: ${{ vars.AI_PROJECT_INSIGHTS_MODEL }}
      SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
      SENSENOVA_BASE_URL: ${{ vars.SENSENOVA_BASE_URL }}
      SENSENOVA_MODEL: ${{ vars.SENSENOVA_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Collect public repository data
        if: env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: npm run collect
      - name: Explain skipped collection
        if: env.SUPABASE_URL == '' || env.SUPABASE_SERVICE_ROLE_KEY == ''
        run: echo "Collection skipped until Supabase repository secrets are configured."
